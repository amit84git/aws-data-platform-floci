# Grafana datasource provisioning for FloCI observability
# Reads pipeline metrics from S3 audit logs stored in MinIO (ingestion-audit bucket)
# Uses Infinity datasource plugin to query S3 objects via MinIO's S3-compatible API
apiVersion: 1

deleteDatasources:
  - name: FloCI Metrics
    orgId: 1

datasources:
  - name: FloCI Audit Logs (S3)
    type: yesoreyeram-infinity-datasource
    access: proxy
    url: http://minio:9000
    basicAuth: true
    basicAuthUser: minioadmin
    secureJsonData:
      basicAuthPassword: minioadmin
    jsonData:
      allowedHosts:
        - http://minio:9000
      tlsSkipVerify: true