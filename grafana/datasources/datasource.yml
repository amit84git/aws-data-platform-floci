# Grafana datasource provisioning for FloCI observability
apiVersion: 1

deleteDatasources:
  - name: FloCI Metrics
    orgId: 1

datasources:
  - name: FloCI Metrics
    type: postgres
    access: proxy
    url: metrics-db:5432
    database: floci_metrics
    user: floci
    secureJsonData:
      password: floci
    jsonData:
      sslmode: disable
      postgresVersion: 1500
      timescaledb: false
  - name: FloCI Engine DB
    type: postgres
    access: proxy
    url: metrics-db:5432
    database: floci_metrics
    user: floci
    secureJsonData:
      password: floci
    jsonData:
      sslmode: disable
      postgresVersion: 1500
      timescaledb: false